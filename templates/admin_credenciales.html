{% extends 'base.html' %}

{% block title %}Cambiar Credenciales - Admin{% endblock %}

{% block content %}
<section class="page-header">
    <div class="container">
        <h1>Cambiar Credenciales</h1>
        <p>Actualiza tu email y contraseña</p>
    </div>
</section>

<section class="form-section">
    <div class="container">
        <div class="credenciales-form">
            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}
            {% if success %}
            <div class="success-message">{{ success }}</div>
            {% endif %}
            
            <form method="POST">
                <div class="form-group">
                    <label for="email_nuevo">Nuevo Email</label>
                    <input type="email" id="email_nuevo" name="email_nuevo" placeholder="nuevo@email.com">
                </div>
                <div class="form-group">
                    <label for="password_actual">Contraseña Actual *</label>
                    <input type="password" id="password_actual" name="password_actual" required>
                </div>
                <div class="form-group">
                    <label for="password_nuevo">Nueva Contraseña</label>
                    <input type="password" id="password_nuevo" name="password_nuevo" placeholder="Deja vacío para no cambiar">
                </div>
                <div class="form-group">
                    <label for="password_nuevo2">Confirmar Nueva Contraseña</label>
                    <input type="password" id="password_nuevo2" name="password_nuevo2" placeholder="Confirma la nueva contraseña">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Guardar Cambios</button>
                <a href="{{ url_for('admin') }}" class="btn btn-secondary btn-block">Volver</a>
            </form>
        </div>
    </div>
</section>

<style>
.credenciales-form {
    max-width: 500px;
    margin: 0 auto;
    background: white;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
.error-message {
    background: #dc3545;
    color: white;
    padding: 12px;
    border-radius: 5px;
    margin-bottom: 20px;
    text-align: center;
}
.success-message {
    background: #28a745;
    color: white;
    padding: 12px;
    border-radius: 5px;
    margin-bottom: 20px;
    text-align: center;
}
</style>
{% endblock %}
