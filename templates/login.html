{% extends 'base.html' %}

{% block title %}Iniciar Sesión - CHRONOS{% endblock %}

{% block content %}
<section class="login-section">
    <div class="login-container">
        <div class="login-header">
            <h1>ACCESO</h1>
            <p>Panel de Administración</p>
        </div>
        
        <form method="POST" class="login-form">
            <div class="form-group">
                <label for="email">EMAIL</label>
                <input type="email" id="email" name="email" required placeholder="admin@correo.com">
            </div>
            <div class="form-group">
                <label for="password">CONTRASEÑA</label>
                <div class="password-input">
                    <input type="password" id="password" name="password" required placeholder="Tu contraseña" autocomplete="current-password">
                    <button type="button" class="toggle-password" onclick="togglePassword()">👁</button>
                </div>
            </div>
            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}
            <button type="submit" class="btn-submit">INGRESAR</button>
        </form>
        
        <div class="login-footer">
            <a href="https://wa.me/{{ telefono_tienda.replace('+', '').replace('-', '').replace(' ', '') }}?text=Hola, necesito recuperar mi contraseña" target="_blank">¿Olvidaste tu contraseña?</a>
        </div>
    </div>
</section>

<style>
.login-section {
    min-height: calc(100vh - 200px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
}

.login-container {
    width: 100%;
    max-width: 400px;
    background: var(--secondary);
    padding: 50px;
    border: 1px solid var(--border);
}

.login-header {
    text-align: center;
    margin-bottom: 40px;
}

.login-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    letter-spacing: 5px;
    margin-bottom: 10px;
}

.login-header p {
    color: var(--gray);
    font-size: 0.85rem;
    letter-spacing: 1px;
}

.login-form {
    display: flex;
    flex-direction: column;
    gap: 25px;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.form-group label {
    font-size: 0.75rem;
    letter-spacing: 2px;
    color: var(--gray);
}

.form-group input {
    padding: 15px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--accent);
    font-size: 0.95rem;
}

.form-group input:focus {
    border-color: var(--accent);
    outline: none;
}

.password-input {
    position: relative;
    display: flex;
}

.password-input input {
    flex: 1;
    padding-right: 50px;
}

.toggle-password {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    color: var(--gray);
    cursor: pointer;
    font-size: 1.2rem;
}

.toggle-password:hover {
    color: var(--accent);
}

.error-message {
    color: #ff4444;
    font-size: 0.85rem;
    text-align: center;
    padding: 10px;
    background: rgba(255, 68, 68, 0.1);
    border: 1px solid #ff4444;
}

.btn-submit {
    padding: 18px;
    background: var(--accent);
    color: var(--primary);
    border: none;
    font-size: 0.85rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 10px;
}

.btn-submit:hover {
    background: var(--accent-hover);
}

.login-footer {
    text-align: center;
    margin-top: 30px;
    padding-top: 30px;
    border-top: 1px solid var(--border);
}

.login-footer a {
    color: var(--gray);
    font-size: 0.8rem;
    letter-spacing: 1px;
}

.login-footer a:hover {
    color: var(--accent);
}
</style>

<script>
function togglePassword() {
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.querySelector('.toggle-password');
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleBtn.textContent = '👁‍🗨';
    } else {
        passwordInput.type = 'password';
        toggleBtn.textContent = '👁';
    }
}
</script>
{% endblock %}
